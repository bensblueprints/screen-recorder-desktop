<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: transparent; overflow: hidden; }
    .pill {
      display: flex; align-items: center; gap: 10px;
      height: 44px; margin: 4px; padding: 0 8px 0 14px;
      background: rgba(13, 16, 24, 0.92);
      border: 1px solid #2a3040; border-radius: 999px;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #e8ebf4; font-size: 13px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      -webkit-app-region: drag; user-select: none;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; animation: blink 1.1s infinite; }
    @keyframes blink { 50% { opacity: 0.25; } }
    #time { font-variant-numeric: tabular-nums; font-weight: 600; min-width: 40px; }
    button {
      -webkit-app-region: no-drag;
      width: 30px; height: 30px; border-radius: 50%;
      border: none; background: #ef4444; color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    button:hover { filter: brightness(1.15); }
    .sq { width: 10px; height: 10px; background: #fff; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="pill">
    <span class="dot"></span>
    <span id="time">00:00</span>
    <button id="stop" title="Stop recording"><span class="sq"></span></button>
  </div>
  <script>
    const started = Date.now();
    setInterval(() => {
      const s = Math.floor((Date.now() - started) / 1000);
      document.getElementById('time').textContent =
        String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
    }, 250);
    document.getElementById('stop').addEventListener('click', () => window.api.overlayStop());
  </script>
</body>
</html>
