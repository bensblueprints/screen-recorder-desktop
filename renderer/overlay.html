<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: transparent; overflow: hidden; }
    .pill {
      display: flex; align-items: center; gap: 10px;
      height: 44px; margin: 4px; padding: 0 8px 0 14px;
      background: rgba(13, 16, 24, 0.92);
      border: 1px solid #2a3040; border-radius: 999px;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #e8ebf4; font-size: 13px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      -webkit-app-region: drag; user-select: none;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; animation: blink 1.1s infinite; }
    @keyframes blink { 50% { opacity: 0.25; } }
    #time { font-variant-numeric: tabular-nums; font-weight: 600; min-width: 40px; }
    button {
      -webkit-app-region: no-drag;
      width: 30px; height: 30px; border-radius: 50%;
      border: none; background: #ef4444; color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    button:hover { filter: brightness(1.15); }
    .sq { width: 10px; height: 10px; background: #fff; border-radius: 2px; }
    #pause { background: #3a4152; }
    .bars { display: flex; gap: 3px; }
    .bars i { width: 3px; height: 11px; background: #fff; border-radius: 1px; display: block; }
    .tri {
      width: 0; height: 0; margin-left: 2px;
      border-style: solid; border-width: 6px 0 6px 10px;
      border-color: transparent transparent transparent #fff;
    }
    .dot.paused { animation: none; opacity: 0.35; background: #f59e0b; }
  </style>
</head>
<body>
  <div class="pill">
    <span class="dot" id="dot"></span>
    <span id="time">00:00</span>
    <button id="stop" title="Stop recording"><span class="sq"></span></button>
    <button id="pause" title="Pause recording"><span class="bars"><i></i><i></i></span></button>
  </div>
  <script>
    const started = Date.now();
    let pausedMs = 0;
    let pauseStartedAt = null;
    let paused = false;

    function fmt(totalSeconds) {
      return String(Math.floor(totalSeconds / 60)).padStart(2, '0') + ':' + String(totalSeconds % 60).padStart(2, '0');
    }

    setInterval(() => {
      const now = paused ? pauseStartedAt : Date.now();
      const s = Math.max(0, Math.floor((now - started - pausedMs) / 1000));
      document.getElementById('time').textContent = fmt(s);
    }, 250);

    document.getElementById('stop').addEventListener('click', () => window.api.overlayStop());
    document.getElementById('pause').addEventListener('click', () => window.api.overlayPauseToggle());

    window.api.onPausedState((isPaused) => {
      if (isPaused === paused) return;
      paused = isPaused;
      if (paused) {
        pauseStartedAt = Date.now();
      } else {
        pausedMs += Date.now() - pauseStartedAt;
        pauseStartedAt = null;
      }
      const btn = document.getElementById('pause');
      btn.innerHTML = paused ? '<span class="tri"></span>' : '<span class="bars"><i></i><i></i></span>';
      btn.title = paused ? 'Resume recording' : 'Pause recording';
      document.getElementById('dot').classList.toggle('paused', paused);
    });
  </script>
</body>
</html>
